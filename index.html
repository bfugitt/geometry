<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Explorers - Level 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
        }
        
        .title-font {
            font-family: 'Fredoka One', cursive;
        }

        .shape-container {
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-shadow {
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .correct-anim {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .study-item:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-3xl mx-auto bg-white rounded-3xl card-shadow overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-500 p-6 text-white text-center">
            <h1 class="text-3xl md:text-4xl title-font tracking-wide">Geometry Explorers</h1>
            <p class="mt-2 opacity-90">Level 1: Identification & Basics</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex border-b">
            <button onclick="switchTab('quiz')" id="tab-quiz" class="flex-1 py-4 font-bold text-blue-600 border-b-4 border-blue-600 transition-all">
                🎯 Play Quiz
            </button>
            <button onclick="switchTab('study')" id="tab-study" class="flex-1 py-4 font-bold text-gray-500 border-b-4 border-transparent hover:text-blue-400 transition-all">
                📚 Study Guide
            </button>
        </div>

        <!-- Main Content Area -->
        <div class="p-6">
            
            <!-- Quiz Section -->
            <div id="quiz-section">
                <div class="flex justify-between items-center mb-6">
                    <div class="bg-blue-100 px-4 py-2 rounded-full text-blue-800 font-bold">
                        Score: <span id="score">0</span>
                    </div>
                    <div class="text-gray-500 font-medium">
                        Question <span id="question-num">1</span>
                    </div>
                </div>

                <div id="quiz-card" class="bg-gray-50 rounded-2xl p-8 mb-6 text-center border-2 border-dashed border-gray-200">
                    <p class="text-xl font-bold text-gray-700 mb-4">What is the name of this geometric figure?</p>
                    <div id="shape-display" class="shape-container">
                        <!-- SVG shape injected here -->
                    </div>
                </div>

                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Buttons injected here -->
                </div>

                <div id="feedback" class="mt-6 text-center text-xl font-bold h-8"></div>
            </div>

            <!-- Study Guide Section -->
            <div id="study-section" class="hidden">
                <h2 class="text-2xl font-bold text-blue-600 mb-4">Geometric Terms Dictionary</h2>
                <p class="text-gray-500 mb-4 text-sm">Click any term to see a larger view!</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="study-list">
                    <!-- Items injected here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Universal Modal (for feedback and study expansion) -->
    <div id="message-box" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-6 md:p-8 rounded-3xl text-center max-w-lg w-full shadow-2xl">
            <div id="modal-content">
                <div id="message-icon" class="text-6xl mb-4"></div>
                <div id="modal-image-container" class="flex justify-center mb-4 bg-gray-50 rounded-xl p-4 hidden"></div>
                <h3 id="message-title" class="text-2xl font-bold mb-2"></h3>
                <p id="message-text" class="text-gray-600 mb-6 whitespace-pre-wrap"></p>
                <button id="modal-btn" onclick="closeMessage()" class="bg-blue-500 text-white px-10 py-3 rounded-full font-bold hover:bg-blue-600 transition-all shadow-lg">Next Question</button>
            </div>
        </div>
    </div>

    <script>
        // Data Definitions
        const shapes = [
            { id: 'point', name: 'Point', definition: 'An exact location in space, represented by a dot.', svg: `<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="10" fill="#3b82f6" /><text x="65" y="55" font-family="Arial" font-weight="bold">A</text></svg>` },
            { id: 'line', name: 'Line', definition: 'A straight path that goes on forever in both directions.', svg: `<svg width="100%" height="100" viewBox="0 0 200 100"><line x1="20" y1="50" x2="180" y2="50" stroke="#3b82f6" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/><defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker></defs></svg>` },
            { id: 'segment', name: 'Line Segment', definition: 'A part of a line with two endpoints.', svg: `<svg width="100%" height="100" viewBox="0 0 200 100"><line x1="40" y1="50" x2="160" y2="50" stroke="#3b82f6" stroke-width="4"/><circle cx="40" cy="50" r="6" fill="#1e40af"/><circle cx="160" cy="50" r="6" fill="#1e40af"/></svg>` },
            { id: 'ray', name: 'Ray', definition: 'A part of a line that has one endpoint and goes on forever in one direction.', svg: `<svg width="100%" height="100" viewBox="0 0 200 100"><line x1="40" y1="50" x2="180" y2="50" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/><circle cx="40" cy="50" r="6" fill="#1e40af"/><defs><marker id="arrow2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker></defs></svg>` },
            { id: 'right_tri', name: 'Right Triangle', definition: 'A triangle with exactly one 90-degree (square) angle.', svg: `<svg width="150" height="150" viewBox="0 0 150 150"><path d="M 30 20 L 30 130 L 130 130 Z" fill="none" stroke="#ef4444" stroke-width="4" /><rect x="30" y="115" width="15" height="15" fill="none" stroke="#ef4444" stroke-width="2" /></svg>` },
            { id: 'equi_tri', name: 'Equilateral Triangle', definition: 'A triangle where all three sides are the same length.', svg: `<svg width="150" height="150" viewBox="0 0 150 150"><path d="M 75 25 L 25 125 L 125 125 Z" fill="none" stroke="#ef4444" stroke-width="4" /></svg>` },
            { id: 'isos_tri', name: 'Isosceles Triangle', definition: 'A triangle with at least two sides that are the same length.', svg: `<svg width="150" height="150" viewBox="0 0 150 150"><path d="M 75 20 L 40 130 L 110 130 Z" fill="none" stroke="#ef4444" stroke-width="4" /></svg>` },
            { id: 'scal_tri', name: 'Scalene Triangle', definition: 'A triangle where all three sides have different lengths.', svg: `<svg width="150" height="150" viewBox="0 0 150 150"><path d="M 40 30 L 130 120 L 20 120 Z" fill="none" stroke="#ef4444" stroke-width="4" /></svg>` },
            { id: 'square', name: 'Square', definition: 'A quadrilateral with 4 equal sides and 4 right angles.', svg: `<svg width="120" height="120" viewBox="0 0 120 120"><rect x="10" y="10" width="100" height="100" fill="none" stroke="#10b981" stroke-width="4" /></svg>` },
            { id: 'rectangle', name: 'Rectangle', definition: 'A quadrilateral with 4 right angles and opposite sides that are equal.', svg: `<svg width="180" height="120" viewBox="0 0 180 120"><rect x="10" y="20" width="160" height="80" fill="none" stroke="#10b981" stroke-width="4" /></svg>` },
            { id: 'rhombus', name: 'Rhombus', definition: 'A "leaning" quadrilateral with 4 equal sides.', svg: `<svg width="180" height="120" viewBox="0 0 180 120"><path d="M 50 20 L 160 20 L 130 100 L 20 100 Z" fill="none" stroke="#10b981" stroke-width="4" /></svg>` },
            { id: 'trapezoid', name: 'Trapezoid', definition: 'A quadrilateral with exactly one pair of parallel sides.', svg: `<svg width="180" height="120" viewBox="0 0 180 120"><path d="M 50 20 L 130 20 L 170 100 L 10 100 Z" fill="none" stroke="#10b981" stroke-width="4" /></svg>` },
            { id: 'pentagon', name: 'Pentagon', definition: 'A polygon with 5 sides and 5 angles.', svg: `<svg width="150" height="150" viewBox="0 0 150 150"><path d="M 75 20 L 130 60 L 110 125 L 40 125 L 20 60 Z" fill="none" stroke="#8b5cf6" stroke-width="4" /></svg>` },
            { id: 'hexagon', name: 'Hexagon', definition: 'A polygon with 6 sides and 6 angles.', svg: `<svg width="150" height="150" viewBox="0 0 150 150"><path d="M 75 20 L 125 45 L 125 105 L 75 130 L 25 105 L 25 45 Z" fill="none" stroke="#8b5cf6" stroke-width="4" /></svg>` }
        ];

        let score = 0;
        let currentQuestion = 0;
        let correctAnswer = null;
        let isStudyModal = false;

        // Initialize App
        window.onload = () => {
            initStudyGuide();
            loadQuestion();
        };

        function switchTab(tab) {
            const quizSec = document.getElementById('quiz-section');
            const studySec = document.getElementById('study-section');
            const quizBtn = document.getElementById('tab-quiz');
            const studyBtn = document.getElementById('tab-study');

            if (tab === 'quiz') {
                quizSec.classList.remove('hidden');
                studySec.classList.add('hidden');
                quizBtn.className = "flex-1 py-4 font-bold text-blue-600 border-b-4 border-blue-600";
                studyBtn.className = "flex-1 py-4 font-bold text-gray-500 border-b-4 border-transparent hover:text-blue-400";
            } else {
                quizSec.classList.add('hidden');
                studySec.classList.remove('hidden');
                studyBtn.className = "flex-1 py-4 font-bold text-blue-600 border-b-4 border-blue-600";
                quizBtn.className = "flex-1 py-4 font-bold text-gray-500 border-b-4 border-transparent hover:text-blue-400";
            }
        }

        function initStudyGuide() {
            const list = document.getElementById('study-list');
            list.innerHTML = '';
            shapes.forEach(shape => {
                const item = document.createElement('div');
                item.className = "study-item bg-white p-4 rounded-xl border-2 border-gray-100 flex items-center shadow-sm cursor-pointer transition-all";
                item.onclick = () => showStudyDetail(shape);
                item.innerHTML = `
                    <div class="w-16 h-16 flex-shrink-0 bg-blue-50 rounded-lg mr-4 flex items-center justify-center p-2">
                        <div class="w-full h-full flex items-center justify-center">
                            ${shape.svg}
                        </div>
                    </div>
                    <div class="overflow-hidden">
                        <h4 class="font-bold text-blue-600 truncate">${shape.name}</h4>
                        <p class="text-xs text-gray-500 line-clamp-1">Click for info</p>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function showStudyDetail(shape) {
            isStudyModal = true;
            const modal = document.getElementById('message-box');
            const title = document.getElementById('message-title');
            const text = document.getElementById('message-text');
            const icon = document.getElementById('message-icon');
            const imgContainer = document.getElementById('modal-image-container');
            const btn = document.getElementById('modal-btn');

            icon.innerText = "";
            imgContainer.innerHTML = `<div class="w-48 h-48 flex items-center justify-center">${shape.svg}</div>`;
            imgContainer.classList.remove('hidden');
            
            title.innerText = shape.name;
            text.innerText = shape.definition;
            btn.innerText = "Close";
            
            modal.classList.remove('hidden');
        }

        function loadQuestion() {
            // Pick a random shape
            const randomIndex = Math.floor(Math.random() * shapes.length);
            const questionShape = shapes[randomIndex];
            correctAnswer = questionShape;

            // Update UI
            document.getElementById('shape-display').innerHTML = questionShape.svg;
            document.getElementById('question-num').innerText = currentQuestion + 1;
            
            // Create options (Correct answer + 3 random ones)
            let options = [questionShape];
            while (options.length < 4) {
                const randomOption = shapes[Math.floor(Math.random() * shapes.length)];
                if (!options.find(o => o.id === randomOption.id)) {
                    options.push(randomOption);
                }
            }
            
            // Shuffle options
            options.sort(() => Math.random() - 0.5);

            // Render buttons
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "py-4 px-6 bg-white border-2 border-gray-200 rounded-xl font-bold text-gray-700 hover:border-blue-400 hover:bg-blue-50 transition-all text-lg";
                btn.innerText = opt.name;
                btn.onclick = () => checkAnswer(opt.id);
                grid.appendChild(btn);
            });
            
            document.getElementById('feedback').innerText = '';
        }

        function checkAnswer(selectedId) {
            isStudyModal = false;
            const modal = document.getElementById('message-box');
            const title = document.getElementById('message-title');
            const text = document.getElementById('message-text');
            const icon = document.getElementById('message-icon');
            const imgContainer = document.getElementById('modal-image-container');
            const btn = document.getElementById('modal-btn');

            imgContainer.classList.add('hidden');
            btn.innerText = "Next Question";

            if (selectedId === correctAnswer.id) {
                score += 10;
                document.getElementById('score').innerText = score;
                icon.innerText = "🌟";
                title.innerText = "Awesome!";
                text.innerHTML = `<span class="text-blue-600 font-bold">${correctAnswer.name}:</span>\n${correctAnswer.definition}`;
                document.getElementById('shape-display').classList.add('correct-anim');
            } else {
                icon.innerText = "💡";
                title.innerText = "Keep Learning!";
                text.innerHTML = `That was a <span class="text-blue-600 font-bold">${correctAnswer.name}</span>.\n\nRemember: ${correctAnswer.definition}`;
            }
            
            modal.classList.remove('hidden');
        }

        function closeMessage() {
            document.getElementById('message-box').classList.add('hidden');
            if (!isStudyModal) {
                document.getElementById('shape-display').classList.remove('correct-anim');
                currentQuestion++;
                loadQuestion();
            }
        }
    </script>
</body>
</html>
